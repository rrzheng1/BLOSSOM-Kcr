name: ptm_gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.19
  - pip=25.3
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy=1.15.3
  - scikit-learn=1.7.2
  - matplotlib=3.10.7
  - pyyaml=6.0.3
  - tqdm=4.67.1
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121
      - torchaudio==2.5.1+cu121
      - seaborn==0.13.2
      - shap==0.49.1
